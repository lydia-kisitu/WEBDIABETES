<html>
    <head>
        <title>
        Diabetes Prediction
        </title>
    </head>
    
    <body>
        <div style="text-align:center;">
            <h1>
                Diabetes Prediction
            </h1>
            
            <form action="predict" method="post">

                <input name="pregnancies" type="number" placeholder="Enter Number of Pregnancies"  min="0" max="20" size="50" style="width: 200px;" required/>
                <br> <br> 
                <input name="glucose" type="number" placeholder="Enter Glucose" min="0" max="400" size="50" style="width: 200px;" required/>
                <br> <br> 
                <input name="bp" type="number" placeholder="Enter Blood Pressure" min="0" max="200" size="50" style="width: 200px;" required/>
                <br> <br> 
                <input name="skin_thickness" type="number" placeholder="Enter Skin Thickness" min="0" max="100" size="50" style="width: 200px;" required/>
                <br> <br> 
                <input name="insulin" type="number" placeholder="Enter Insulin" min="30" max="900" size="50" style="width: 200px;" required/>
                <br> <br> 
                <input name="bmi" type="number" step="0.01" placeholder="Enter BMI" min="20" max="80" size="50" style="width: 200px;"  required/>
                <br> <br> 
                <input name="DPF" type="number" step="0.01" placeholder="Enter Diabetes Pedigree Function" min="0.0" max="4.0" size="50" style="width: 200px;" required/>
                <br> <br>
                <input name="AGE" type="number" placeholder="Enter Age" min="0" max="120" size="50" style="width: 200px;" required/>
                <br> 
                
               <br> <br><button>Predict Diabetes </button>
            
                <br><br>
                {{prediction_value}}
            </form>
        </div>
    </body>    
</html>
